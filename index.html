<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <title>Document</title>
</head>

<body>
  <div class="container">
    <section>
      <div class="header">
        <h1 class="header-heading">Metric/Imperial Unit Conversion</h1>
        <input id="input-number" class="input-area" type="text">
        <button id="convert-btn" class="convert-btn">Convert</button>
      </div>
    </section>

    <section class="conversion">
      <div class="length">
        <h3>Length (Meter/Feet)</h3>
        <p id="convert-length" class="display-input"></p>
      </div>

      <div class="volume">
        <h3>Volume(Litres/Gallons)</h3>
        <p id="convert-volume" class="display-input"></p>
      </div>

      <div class="mass">
        <h3>Mass(Kilograms/Pounds)</h3>
        <p id="convert-mass" class="display-input"></p>
      </div>
    </section>
  </div>
  <script src="index.js"></script>
</body>

</html>
